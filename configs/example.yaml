seed: 42
samples: 10000
output: outputs/pilot.parquet

scenario:
  distance_m: [5.0, 250.0]
  relative_speed_mps: [-40.0, 40.0]
  target_count: [1, 20]

environment:
  visibility_m: [50.0, 20000.0]
  ambient_illuminance_lux: [0.01, 100000.0]
  rain_rate_mm_h: [0.0, 50.0]

transmitter:
  power_w: [0.5, 20.0]
  beam_divergence_mrad: [0.1, 5.0]

receiver:
  aperture_m2: 0.001
  noise_floor_dbm: -90.0
